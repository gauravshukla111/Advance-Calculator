<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Calculator Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
    }

    .light body {
      background: linear-gradient(to right, #e2e8f0, #cbd5f5);
    }

    .glass {
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .float {
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-8px)}
    }

    .sidebar {
      position: fixed;
      right: -300px;
      top: 0;
      height: 100%;
      width: 260px;
      transition: right 0.4s ease;
    }

    .sidebar.active {
      right: 0;
    }

    .btn {
      position: relative;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .btn::after {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.4), transparent);
      top: -100%;
      left: -100%;
      transition: all 0.4s ease;
    }

    .btn:hover::after {
      top: 0;
      left: 0;
    }

    .btn:active {
      transform: scale(0.85) rotate(-2deg);
      box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4 text-white transition-all duration-500">

<!-- Calculator -->
<div class="glass p-5 rounded-3xl shadow-2xl w-full max-w-sm float">

  <!-- Top bar -->
  <div class="flex justify-between mb-3">
    <button onclick="toggleTheme()" class="bg-white/10 px-3 py-1 rounded">🌙</button>
    <button onclick="toggleHistory()" class="bg-white/10 px-3 py-1 rounded">📜</button>
  </div>

  <!-- Display -->
  <div id="display" class="bg-black/70 text-green-400 text-right text-4xl p-4 rounded-2xl mb-4 overflow-x-auto">0</div>

  <!-- Buttons -->
  <div class="grid grid-cols-4 gap-3">
    <button onclick="clearDisplay()" class="btn col-span-2 bg-red-500/80 p-4 rounded-xl">C</button>
    <button onclick="deleteLast()" class="btn bg-yellow-500/80 p-4 rounded-xl">⌫</button>
    <button onclick="append('/')" class="btn bg-indigo-500/80 p-4 rounded-xl">÷</button>

    <button onclick="append('7')" class="btn bg-gray-700/70 p-4 rounded-xl">7</button>
    <button onclick="append('8')" class="btn bg-gray-700/70 p-4 rounded-xl">8</button>
    <button onclick="append('9')" class="btn bg-gray-700/70 p-4 rounded-xl">9</button>
    <button onclick="append('*')" class="btn bg-indigo-500/80 p-4 rounded-xl">×</button>

    <button onclick="append('4')" class="btn bg-gray-700/70 p-4 rounded-xl">4</button>
    <button onclick="append('5')" class="btn bg-gray-700/70 p-4 rounded-xl">5</button>
    <button onclick="append('6')" class="btn bg-gray-700gi/70 p-4 rounded-xl">6</button>
    <button onclick="append('-')" class="btn bg-indigo-500/80 p-4 rounded-xl">−</button>

    <button onclick="append('1')" class="btn bg-gray-700/70 p-4 rounded-xl">1</button>
    <button onclick="append('2')" class="btn bg-gray-700/70 p-4 rounded-xl">2</button>
    <button onclick="append('3')" class="btn bg-gray-700/70 p-4 rounded-xl">3</button>
    <button onclick="append('+')" class="btn bg-indigo-500/80 p-4 rounded-xl">+</button>

    <button onclick="append('0')" class="btn col-span-2 bg-gray-700/70 p-4 rounded-xl">0</button>
    <button onclick="append('.')" class="btn bg-gray-700/70 p-4 rounded-xl">.</button>
    <button onclick="calculate()" class="btn bg-green-500/80 p-4 rounded-xl">=</button>
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar" class="sidebar glass p-4">
  <h2 class="mb-2 text-sm opacity-70">History</h2>
  <ul id="history" class="text-sm space-y-1 max-h-[90vh] overflow-y-auto"></ul>
</div>

<script src="app.js"></script>
</body>
</html>
