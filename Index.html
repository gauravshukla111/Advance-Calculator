<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Calculator UI</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at top, #1f2937, #020617);
    }

    .glass {
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn {
      transition: all 0.15s ease;
    }

    .btn:active {
      transform: scale(0.9);
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    .fade-in {
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);} 
      to { opacity: 1; transform: translateY(0);} 
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

  <div class="glass rounded-3xl p-5 shadow-2xl w-full max-w-sm fade-in">

    <!-- Display -->
    <div id="display" class="bg-black/70 text-green-400 text-right text-4xl p-4 rounded-2xl mb-4 overflow-x-auto">
      0
    </div>

    <!-- Buttons -->
    <div class="grid grid-cols-4 gap-3">

      <button onclick="clearDisplay()" class="btn col-span-2 bg-red-500/80 hover:bg-red-600 p-4 rounded-xl">C</button>
      <button onclick="deleteLast()" class="btn bg-yellow-500/80 hover:bg-yellow-600 p-4 rounded-xl">⌫</button>
      <button onclick="append('/')" class="btn bg-indigo-500/80 hover:bg-indigo-600 p-4 rounded-xl">÷</button>

      <button onclick="append('7')" class="btn bg-gray-700/70 hover:bg-gray-600 p-4 rounded-xl">7</button>
      <button onclick="append('8')" class="btn bg-gray-700/70 hover:bg-gray-600 p-4 rounded-xl">8</button>
      <button onclick="append('9')" class="btn bg-gray-700/70 hover:bg-gray-600 p-4 rounded-xl">9</button>
      <button onclick="append('*')" class="btn bg-indigo-500/80 hover:bg-indigo-600 p-4 rounded-xl">×</button>

      <button onclick="append('4')" class="btn bg-gray-700/70 hover:bg-gray-600 p-4 rounded-xl">4</button>
      <button onclick="append('5')" class="btn bg-gray-700/70 hover:bg-gray-600 p-4 rounded-xl">5</button>
      <button onclick="append('6')" class="btn bg-gray-700/70 hover:bg-gray-600 p-4 rounded-xl">6</button>
      <button onclick="append('-')" class="btn bg-indigo-500/80 hover:bg-indigo-600 p-4 rounded-xl">−</button>

      <button onclick="append('1')" class="btn bg-gray-700/70 hover:bg-gray-600 p-4 rounded-xl">1</button>
      <button onclick="append('2')" class="btn bg-gray-700/70 hover:bg-gray-600 p-4 rounded-xl">2</button>
      <button onclick="append('3')" class="btn bg-gray-700/70 hover:bg-gray-600 p-4 rounded-xl">3</button>
      <button onclick="append('+')" class="btn bg-indigo-500/80 hover:bg-indigo-600 p-4 rounded-xl">+</button>

      <button onclick="append('0')" class="btn col-span-2 bg-gray-700/70 hover:bg-gray-600 p-4 rounded-xl">0</button>
      <button onclick="append('.')" class="btn bg-gray-700/70 hover:bg-gray-600 p-4 rounded-xl">.</button>
      <button onclick="calculate()" class="btn bg-green-500/80 hover:bg-green-600 p-4 rounded-xl">=</button>

    </div>
</div>
